<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>aisinger engine</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #f7f8f9;
    color: #161819;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", system-ui, sans-serif;
  }
  main {
    width: min(560px, calc(100vw - 40px));
    border: 1px solid rgba(15, 17, 23, 0.08);
    border-radius: 12px;
    background: #fff;
    padding: 28px;
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
  .mark { display: grid; place-items: center; width: 26px; height: 26px; border-radius: 7px; background: #5e6ad2; color: #fff; font-weight: 650; }
  h1 { margin: 0; font-size: 20px; line-height: 1.2; }
  p { margin: 10px 0 0; color: #4a4f57; line-height: 1.6; }
  .status { margin-top: 22px; display: flex; align-items: center; gap: 9px; color: #2f6f51; font-size: 13px; }
  .dot { width: 8px; height: 8px; border-radius: 999px; background: #2da670; }
  a { display: inline-flex; margin-top: 24px; border-radius: 7px; background: #5e6ad2; color: #fff; padding: 9px 13px; text-decoration: none; font-size: 14px; font-weight: 520; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; background: #eff0f2; border-radius: 4px; padding: 2px 5px; }
</style>
</head>
<body>
<main>
  <div class="brand"><span class="mark">a</span><strong>aisinger</strong></div>
  <h1>后端引擎正在运行</h1>
  <p>这个端口只负责 API、任务执行、音频文件和进度事件。请使用 Next.js 工作台来跑完整链路。</p>
  <div class="status"><span class="dot"></span><span>FastAPI ready · <code>/api</code> · <code>/sse</code></span></div>
  <a href="http://127.0.0.1:3000/">打开工作台 :3000</a>
</main>
</body>
</html>
